<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Weir - your database business logic, as a service">
  <defs>
    <linearGradient id="weirCanvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16181a"/>
      <stop offset="1" stop-color="#0f1011"/>
    </linearGradient>
    <linearGradient id="weirText" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4fd6c9"/>
      <stop offset="1" stop-color="#4ea1ff"/>
    </linearGradient>
    <!-- Mark gradient in the badge's user space; the group is translated/scaled, so 0..128 here maps
         onto the badge - one continuous cyan -> accent sweep across the whole W. -->
    <linearGradient id="weirMarkEdge" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4fd6c9"/>
      <stop offset="1" stop-color="#4ea1ff"/>
    </linearGradient>
    <mask id="ringCut">
      <rect x="0" y="0" width="128" height="128" fill="white"/>
      <g fill="black">
        <circle cx="34" cy="43.2" r="10"/>
        <circle cx="64" cy="43.2" r="10"/>
        <circle cx="94" cy="43.2" r="10"/>
      </g>
      <rect x="40" y="72" width="80" height="20" fill="black"/>
    </mask>
    <mask id="barCut">
      <rect x="0" y="0" width="128" height="128" fill="black"/>
      <polygon points="43.2,70 84.8,70 77.2,84 50.8,84" fill="white"/>
    </mask>
  </defs>

  <rect x="0" y="0" width="1280" height="640" fill="url(#weirCanvas)"/>

  <!-- logo mark: the Weir favicon, scaled and centered -->
  <g transform="translate(544,100) scale(1.5)">
    <rect x="0" y="0" width="128" height="128" rx="28" fill="#131416"/>
    <rect x="2.8" y="2.8" width="122.4" height="122.4" rx="25.6" fill="none" stroke="#26282b" stroke-width="4.8"/>
    <g fill="none" stroke="url(#weirMarkEdge)" mask="url(#ringCut)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M34 43.2 L51.2 76 L64 51.2 L76.8 76 L94 43.2"/>
    </g>
    <g fill="none" stroke="url(#weirMarkEdge)" stroke-width="4" mask="url(#barCut)" stroke-linecap="round">
      <path d="M38 74.8 L90 74.8"/>
      <path d="M38 80 L90 80"/>
    </g>
    <g fill="none" stroke="#4fd6c9" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="34" cy="43.2" r="6"/>
      <circle cx="64" cy="43.2" r="6"/>
      <circle cx="94" cy="43.2" r="6"/>
    </g>
  </g>

  <text x="640" y="430" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="132" font-weight="700" fill="url(#weirText)">Weir</text>
  <text x="640" y="484" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="30" font-weight="400" fill="#a3a3a8">Your database business logic, as a service</text>
  <text x="640" y="556" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="23" font-weight="400" fill="#6d6d73">High-performance HTTP gateway  |  .NET 10  |  Admin UI built on Flare</text>
</svg>
