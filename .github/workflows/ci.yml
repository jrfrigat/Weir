name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # MinVer needs the full history + tags to derive the version

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        # The runner provides Docker, so enable the opt-in Testcontainers integration tests.
        env:
          WEIR_CONTAINER_TESTS: '1'
        run: dotnet test -c Release --no-build --verbosity normal
