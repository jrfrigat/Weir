name: Release

# Runs when a version tag is pushed, e.g. v0.2.0. Builds and tests, packs the eight library NuGet
# packages and publishes them to NuGet.org via Trusted Publishing (OIDC - no long-lived API key),
# builds and pushes the host container image to the GitHub Container Registry, and creates a GitHub
# Release. The version comes from the tag (v1.2.3 -> 1.2.3).

on:
  push:
    tags: [ 'v*' ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push the container image to GHCR
  id-token: write   # OIDC token for NuGet Trusted Publishing (no long-lived API key)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -p:Version=${{ steps.version.outputs.value }}

      - name: Test
        # The runner provides Docker, so enable the opt-in Testcontainers integration tests.
        env:
          WEIR_CONTAINER_TESTS: '1'
        run: dotnet test -c Release --no-build --verbosity normal

      # Only IsPackable=true projects produce packages (the eight libraries); the host, admin, tests and
      # the sample connector are IsPackable=false, so pack skips them.
      - name: Pack
        run: dotnet pack Weir.slnx -c Release --no-build -p:Version=${{ steps.version.outputs.value }} -o artifacts

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived NuGet API key. Requires a
      # Trusted Publisher policy on nuget.org for this repository + workflow, plus the nuget.org account
      # username in the NUGET_USER repository variable. No long-lived secret is stored in GitHub.
      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      # GHCR requires a lowercase repository path, but github.repository preserves the repo's case
      # (e.g. jrfrigat/Weir). Lowercase it for the image tags.
      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.value }}
            ${{ steps.image.outputs.name }}:latest

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" artifacts/*.nupkg --generate-notes --title "${{ github.ref_name }}"
