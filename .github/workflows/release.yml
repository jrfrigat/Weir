name: Release

# Runs when a version tag is pushed, e.g. v0.2.0. Builds and tests, packs the eight library NuGet
# packages and publishes them to NuGet.org via Trusted Publishing (OIDC - no long-lived API key),
# builds and pushes the host container image to the GitHub Container Registry, and creates a GitHub
# Release. The version comes from the tag (v1.2.3 -> 1.2.3).

on:
  push:
    tags: [ 'v*' ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push the container image to GHCR
  id-token: write   # OIDC token for NuGet Trusted Publishing (no long-lived API key)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -p:Version=${{ steps.version.outputs.value }}

      - name: Test
        # The runner provides Docker, so enable the opt-in Testcontainers integration tests.
        env:
          WEIR_CONTAINER_TESTS: '1'
        run: dotnet test -c Release --no-build --verbosity normal

      # Only IsPackable=true projects produce packages (the eight libraries); the host, admin, tests and
      # the sample connector are IsPackable=false, so pack skips them.
      - name: Pack
        run: dotnet pack Weir.slnx -c Release --no-build -p:Version=${{ steps.version.outputs.value }} -o artifacts

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived NuGet API key. Requires a
      # Trusted Publisher policy on nuget.org for this repository + workflow, plus the nuget.org account
      # username in the NUGET_USER repository variable. No long-lived secret is stored in GitHub.
      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      # Build the image tag list. GHCR needs a lowercase repository path (github.repository preserves
      # the repo's case, e.g. jrfrigat/Weir). Docker Hub tags are added only when the DOCKERHUB_USERNAME
      # variable is set, so the release still works with GHCR alone if Docker Hub is not configured.
      - name: Compute image tags
        id: tags
        env:
          DOCKERHUB_USER: ${{ vars.DOCKERHUB_USERNAME }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          GHCR="ghcr.io/${GITHUB_REPOSITORY,,}"
          {
            echo "list<<EOF"
            echo "${GHCR}:${VERSION}"
            echo "${GHCR}:latest"
            if [ -n "${DOCKERHUB_USER}" ]; then
              echo "docker.io/${DOCKERHUB_USER}/weir:${VERSION}"
              echo "docker.io/${DOCKERHUB_USER}/weir:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.list }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" artifacts/*.nupkg --generate-notes --title "${{ github.ref_name }}"
